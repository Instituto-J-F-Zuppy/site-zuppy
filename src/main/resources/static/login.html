<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Entrar | Zuppy!</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <header class="login-header">

        <a href="index.html" class="logo-area">
            <img src="img/logo_zuppy.png" alt="Página inicial da Zuppy" class="logo-zuppy">
        </a>

        <div class="header-acoes">

            <button type="button" class="botao-header" aria-label="Abrir opções de acessibilidade"
                title="Acessibilidade">
                <img src="img/acessibilidade_icon.png" alt="">
            </button>

            <a href="#" class="botao-header" aria-label="Falar com a Zuppy pelo WhatsApp" title="WhatsApp">
                <img src="img/whatsapp_icon.png" alt="">
            </a>

        </div>

    </header>

    <main class="login-main">

        <aside class="beneficios-login">
            <img src="img/fundo_roxo_login.png" alt="" class="fundo-beneficios">

            <div class="conteudo-beneficios">
                <div class="boneco-area">
                    <img src="img/pelucia_enzo-herrera.png" alt="Boneco personalizado Enzo Herrera segurando um coração"
                        class="boneco-enzo">
                </div>

                <h2>
                    Vantagens de<br>
                    ser Zuppy!
                </h2>

                <div class="lista-beneficios">

                    <article class="beneficio-card">
                        <div class="beneficio-icone frete">
                            <img src="img/frete_gratis.png" alt="">
                        </div>

                        <div class="beneficio-texto">
                            <h3>Frete grátis</h3>

                            <p>
                                Em compras acima<br>
                                de R$199,00
                            </p>
                        </div>

                    </article>

                    <article class="beneficio-card">
                        <div class="beneficio-icone seguranca">
                            <img src="img/escudo_seguranca.png" alt="">
                        </div>

                        <div class="beneficio-texto">
                            <h3>Compra segura</h3>

                            <p>
                                Seus dados protegidos<br>
                                com carinho
                            </p>
                        </div>
                    </article>
                </div>
            </div>
        </aside>

        <section class="login-card">
            <div class="titulo-login">
                <span class="detalhe detalhe-esquerdo" aria-hidden="true">
                    <i></i>
                    <i></i>
                    <i></i>
                </span>

                <div>
                    <h1>Bem-Vindo!</h1>
                    <span class="linha-titulo"></span>
                </div>

                <span class="detalhe detalhe-direito" aria-hidden="true">
                    <i></i>
                    <i></i>
                    <i></i>
                </span>

            </div>

            <p class="login-subtitulo">
                Acesse sua conta e encontre o brinquedo<br>
                certo para cada momento.
            </p>

            <form class="form-login" id="formLogin">

                <div class="campo-grupo">

                    <label for="email">
                        E-mail
                    </label>

                    <div class="campo-input">
                        <img src="img/email_icon.png" alt="" class="campo-icone">

                        <input type="email" id="email" name="email" placeholder="seu@gmail.com" autocomplete="email"
                            required>
                    </div>

                    <small class="mensagem-erro" id="erroEmail"></small>

                </div>

                <div class="campo-grupo">

                    <label for="senha">
                        Senha
                    </label>

                    <div class="campo-input">
                        <img src="img/senha_icon.png" alt="" class="campo-icone">

                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha"
                            autocomplete="current-password">

                        <button type="button" class="mostrar-senha" id="mostrarSenha" aria-label="Mostrar senha">
                            <img src="img/olho_senha_icon.png" alt="">
                        </button>
                    </div>
                    <small class="mensagem-erro" id="erroSenha"></small>

                </div>

                <div class="opcoes-login">
                    <label class="lembrar-area">
                        <input type="checkbox" id="lembrar" name="lembrar">
                        <span class="checkbox-personalizado"></span>

                        <span>
                            Lembrar de mim
                        </span>

                    </label>

                    <a href="#" class="link-roxo">
                        Esqueci minha senha
                    </a>

                </div>

                <button type="submit" class="botao-entrar-login">
                    Entrar
                </button>

                <div class="separador">

                    <span></span>

                    <p>ou</p>

                    <span></span>

                </div>

                <p class="cadastro-texto">
                    Não tem conta?

                    <a href="cadastro.html" class="link-roxo">
                        Cadastre-se
                    </a>
                </p>

            </form>

        </section>

        <section class="mascote-area">

            <div class="balao-fala">
                <p>
                    Oi! Que bom<br>
                    te ver por aqui
                    <span aria-hidden="true">💙</span>
                </p>
            </div>

            <img src="img/pipo_joinha.png" alt="Mascote azul da Zuppy dando boas-vindas" class="mascote-login">

        </section>

    </main>

    <script src="login.js"></script>
</body>

</html>
