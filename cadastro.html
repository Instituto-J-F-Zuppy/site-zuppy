<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastre-se | Zuppy!</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>

    <header class="login-header">

        <a href="index.html" class="logo-area">
            <img src="img/logo_zuppy.png" alt="Página inicial da Zuppy" class="logo-zuppy">
        </a>

        <div class="header-acoes">

            <button type="button" class="botao-header" aria-label="Abrir opções de acessibilidade"
                title="Acessibilidade">
                <img src="img/acessibilidade_icon.png" alt="">
            </button>

            <a href="#" class="botao-header" aria-label="Falar com a Zuppy pelo WhatsApp" title="WhatsApp">
                <img src="img/whatsapp_icon.png" alt="">
            </a>

        </div>

    </header>

    <main class="login-main cadastro-main">

        <aside class="beneficios-login">

            <img src="img/fundo_roxo_login.png" alt="" class="fundo-beneficios">

            <div class="conteudo-beneficios">

                <div class="boneco-area">

                    <img src="img/pelucia_enzo-herrera.png" alt="Boneco personalizado Enzo Herrera segurando um coração"
                        class="boneco-enzo">

                </div>

                <h2>
                    Vantagens de<br>
                    ser Zuppy!
                </h2>

                <div class="lista-beneficios">

                    <article class="beneficio-card">

                        <div class="beneficio-icone frete">

                            <img src="img/frete_gratis.png" alt="">

                        </div>

                        <div class="beneficio-texto">

                            <h3>Frete grátis</h3>

                            <p>
                                Em compras acima<br>
                                de R$199,00
                            </p>

                        </div>

                    </article>

                    <article class="beneficio-card">

                        <div class="beneficio-icone seguranca">

                            <img src="img/escudo_seguranca.png" alt="">

                        </div>

                        <div class="beneficio-texto">

                            <h3>Compra segura</h3>

                            <p>
                                Seus dados protegidos<br>
                                com carinho
                            </p>

                        </div>

                    </article>

                </div>

            </div>

        </aside>

        <section class="login-card cadastro-card">

            <div class="titulo-login titulo-cadastro">

                <span class="detalhe detalhe-esquerdo" aria-hidden="true">
                    <i></i>
                    <i></i>
                    <i></i>
                </span>

                <div>

                    <h1>Vamos começar</h1>

                    <span class="linha-titulo"></span>

                </div>

                <span class="detalhe detalhe-direito" aria-hidden="true">
                    <i></i>
                    <i></i>
                    <i></i>
                </span>

            </div>

            <p class="login-subtitulo cadastro-subtitulo">
                Crie sua conta e encontre o brinquedo certo<br>
                para cada momento.
            </p>

            <form class="form-login form-cadastro" id="formCadastro" novalidate>

                <p class="passo-cadastro">
                    Passo 1 de 2
                </p>

                <div class="campo-grupo">

                    <label for="nome">
                        Nome completo
                    </label>

                    <div class="campo-input campo-sem-icone">

                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" autocomplete="name"
                            maxlength="100" required>

                    </div>

                    <small class="mensagem-erro" id="erroNome"></small>

                </div>

                <div class="campo-grupo">

                    <label for="email">
                        E-mail
                    </label>

                    <div class="campo-input">

                        <img src="img/email_icon.png" alt="" class="campo-icone">

                        <input type="email" id="email" name="email" placeholder="seu@gmail.com" autocomplete="email"
                            maxlength="120" required>

                    </div>

                    <small class="mensagem-erro" id="erroEmail"></small>

                </div>

                <div class="campo-grupo">

                    <label for="telefone">
                        Telefone
                    </label>

                    <div class="campo-input">

                        <img src="img/telefone_icon.png" alt="" class="campo-icone">

                        <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone"
                            autocomplete="tel" inputmode="numeric" maxlength="15" required>

                    </div>

                    <small class="mensagem-erro" id="erroTelefone"></small>

                </div>

                <button type="submit" class="botao-entrar-login botao-proximo"> Próximo ></button>

                <div class="separador separador-cadastro">

                    <span></span>

                    <p>ou</p>

                    <span></span>
                </div>

                <p class="cadastro-texto">
                    Já tem conta?<a href="login.html" class="link-roxo"> Entre</a>
                </p>
            </form>
        </section>

        <section class="mascote-area cadastro-mascote-area">

            <div class="balao-fala balao-cadastro">
                <p>
                    Está pronto para<br>
                    entrar em um<br>
                    mundo de aventuras?
                    <span aria-hidden="true">💙</span>
                </p>
            </div>

            <img src="img/pipo_oi.png" alt="Mascote azul da Zuppy dando boas-vindas"
                class="mascote-login mascote-cadastro">
        </section>
    </main>
    <script src="cadastro.js"></script>
</body>

</html>
